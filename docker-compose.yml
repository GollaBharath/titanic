services:
  # Gitea server (dev.titanic.htb)
  gitea:
    build:
      context: ./gitea
      dockerfile: Dockerfile
    container_name: titanic-gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
    volumes:
      - gitea-data:/data
    ports:
      - "3222:2222" # Gitea SSH (internal port 2222)
    networks:
      titanic-net:
        ipv4_address: 10.20.0.12
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Combined container (nginx + flask-app + target)
  combined:
    build:
      context: ./combined
      dockerfile: Dockerfile
    container_name: titanic-combined
    hostname: titanic
    privileged: true # Needed for cron and full system access
    ports:
      - "80:80" # Web access (nginx)
      - "2223:22" # SSH access
    volumes:
      - gitea-data:/home/developer/gitea/data:ro # Read-only access to Gitea data
      - tickets-data:/opt/app/tickets
    depends_on:
      - gitea
    networks:
      titanic-net:
        ipv4_address: 10.20.0.11

networks:
  titanic-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/16

volumes:
  gitea-data:
  tickets-data:
