APP_NAME = Titanic Development Server
RUN_MODE = prod
RUN_USER = git
WORK_PATH = /data/gitea

[security]
INSTALL_LOCK = true
SECRET_KEY = changeme_gitea_secret_key_12345
INTERNAL_TOKEN = changeme_internal_token_67890

[database]
DB_TYPE = sqlite3
PATH = /data/gitea/gitea.db
LOG_SQL = false

[repository]
ROOT = /data/git/repositories
DISABLE_HTTP_GIT = false
ENABLE_PUSH_CREATE_USER = true
ENABLE_PUSH_CREATE_ORG = true

[server]
DOMAIN = dev.titanic.htb
HTTP_PORT = 3000
ROOT_URL = http://dev.titanic.htb/
DISABLE_SSH = false
SSH_PORT = 2222
START_SSH_SERVER = true
LFS_START_SERVER = false
OFFLINE_MODE = false

[mailer]
ENABLED = false

[service]
REGISTER_EMAIL_CONFIRM = false
ENABLE_NOTIFY_MAIL = false
DISABLE_REGISTRATION = false
ALLOW_ONLY_EXTERNAL_REGISTRATION = false
ENABLE_CAPTCHA = false
REQUIRE_SIGNIN_VIEW = false
DEFAULT_KEEP_EMAIL_PRIVATE = false
DEFAULT_ALLOW_CREATE_ORGANIZATION = true
DEFAULT_ENABLE_TIMETRACKING = true
NO_REPLY_ADDRESS = noreply.localhost

[picture]
DISABLE_GRAVATAR = true
ENABLE_FEDERATED_AVATAR = false

[openid]
ENABLE_OPENID_SIGNIN = false
ENABLE_OPENID_SIGNUP = false

[session]
PROVIDER = file

[log]
MODE = file
LEVEL = info
ROOT_PATH = /data/gitea/log

[oauth2]
ENABLE = false
JWT_SECRET = 4jDtqeH1R67VYaOsLJXfHXHfMbBYEfNi8Qbd7Om1oP4
