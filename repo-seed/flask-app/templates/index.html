<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>RMS Titanic - Book Your Journey</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family: "Georgia", serif;
				background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
				min-height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				padding: 20px;
			}

			.container {
				background: white;
				border-radius: 10px;
				box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
				max-width: 600px;
				width: 100%;
				padding: 40px;
			}

			h1 {
				color: #1e3c72;
				text-align: center;
				margin-bottom: 10px;
				font-size: 2.5em;
			}

			.subtitle {
				text-align: center;
				color: #666;
				margin-bottom: 30px;
				font-style: italic;
			}

			.form-group {
				margin-bottom: 20px;
			}

			label {
				display: block;
				margin-bottom: 5px;
				color: #333;
				font-weight: bold;
			}

			input,
			select {
				width: 100%;
				padding: 12px;
				border: 2px solid #ddd;
				border-radius: 5px;
				font-size: 16px;
				transition: border-color 0.3s;
			}

			input:focus,
			select:focus {
				outline: none;
				border-color: #1e3c72;
			}

			.btn {
				width: 100%;
				padding: 15px;
				background: #1e3c72;
				color: white;
				border: none;
				border-radius: 5px;
				font-size: 18px;
				cursor: pointer;
				transition: background 0.3s;
			}

			.btn:hover {
				background: #2a5298;
			}

			.message {
				margin-top: 20px;
				padding: 15px;
				border-radius: 5px;
				text-align: center;
				display: none;
			}

			.success {
				background: #d4edda;
				color: #155724;
				border: 1px solid #c3e6cb;
			}

			.error {
				background: #f8d7da;
				color: #721c24;
				border: 1px solid #f5c6cb;
			}

			.ship-icon {
				text-align: center;
				font-size: 4em;
				margin-bottom: 20px;
			}

			.download-link {
				display: inline-block;
				margin-top: 10px;
				color: #1e3c72;
				text-decoration: underline;
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="ship-icon">🚢</div>
			<h1>RMS Titanic</h1>
			<p class="subtitle">Book Your Passage on the Ship of Dreams</p>

			<form id="bookingForm">
				<div class="form-group">
					<label for="name">Full Name</label>
					<input type="text" id="name" name="name" required />
				</div>

				<div class="form-group">
					<label for="email">Email Address</label>
					<input type="email" id="email" name="email" required />
				</div>

				<div class="form-group">
					<label for="phone">Phone Number</label>
					<input type="tel" id="phone" name="phone" required />
				</div>

				<div class="form-group">
					<label for="date">Sailing Date</label>
					<input
						type="date"
						id="date"
						name="date"
						value="1912-04-15"
						required />
				</div>

				<div class="form-group">
					<label for="cabin">Cabin Class</label>
					<select id="cabin" name="cabin" required>
						<option value="First Class">First Class - Luxury Suite</option>
						<option value="Second Class">Second Class - Comfort Cabin</option>
						<option value="Third Class">Third Class - Standard Cabin</option>
						<option value="Deluxe">Deluxe - Premium Experience</option>
					</select>
				</div>

				<button type="submit" class="btn">Book Your Ticket</button>
			</form>

			<div id="message" class="message"></div>
		</div>

		<script>
			document
				.getElementById("bookingForm")
				.addEventListener("submit", async (e) => {
					e.preventDefault();

					const formData = {
						name: document.getElementById("name").value,
						email: document.getElementById("email").value,
						phone: document.getElementById("phone").value,
						date: document.getElementById("date").value,
						cabin: document.getElementById("cabin").value,
					};

					try {
						const response = await fetch("/book", {
							method: "POST",
							headers: {
								"Content-Type": "application/json",
							},
							body: JSON.stringify(formData),
						});

						const data = await response.json();
						const messageDiv = document.getElementById("message");

						if (response.ok) {
							messageDiv.className = "message success";
							messageDiv.style.display = "block";
							messageDiv.innerHTML = `
                        ✓ ${data.message}<br>
                        <a class="download-link" href="/download?ticket=${data.ticket_id}">
                            Download Your Ticket
                        </a>
                    `;
							document.getElementById("bookingForm").reset();
						} else {
							messageDiv.className = "message error";
							messageDiv.style.display = "block";
							messageDiv.textContent = "✗ " + (data.error || "Booking failed");
						}
					} catch (error) {
						const messageDiv = document.getElementById("message");
						messageDiv.className = "message error";
						messageDiv.style.display = "block";
						messageDiv.textContent = "✗ Network error occurred";
					}
				});
		</script>
	</body>
</html>
